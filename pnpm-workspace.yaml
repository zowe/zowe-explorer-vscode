packages:
  - "packages/*"
  - "packages/zowe-explorer/src/webviews/"
  - "!**/test/**"
shamefullyHoist: true
publicHoistPattern:
  - "*"
linkWorkspacePackages: true
allowBuilds:
  "@vscode/vsce-sign": true
  "@zowe/secrets-for-zowe-sdk": true
  cpu-features: true
  edgedriver: true
  esbuild: true
  geckodriver: true
  keytar: true
  ssh2: true
overrides:
  "@tootallnate/once": "^3.0.1"
  "ajv@6": "^6.14.0"
  "ajv@8": "^8.18.0"
  "basic-ftp@5": "^5.3.1"
  "diff@5": "^5.2.2"
  "diff@>5": "^8.0.3"
  "fast-uri": "^3.1.1"
  "fast-xml-builder": "^1.1.7"
  "fast-xml-parser": "^5.7.0"
  "fastify": "^5.8.5"
  "file-type": "^21.3.1"
  "flatted": "^3.4.2"
  "ip-address": "^10.1.1"
  "katex": "^0.16.35"
  "serialize-javascript": "^7.0.3"
  "tar-fs@3": "^3.1.1"
  "js-yaml": "^4.2.0"
  "markdown-it@14": "^14.2.0"
  "vite>esbuild": "^0.25.0"
  "esbuild-loader>esbuild": "^0.27.1"
  "form-data": "^4.0.6"
  "vite": "^6.4.3"
  "minimatch@3": "^3.1.4"
  "minimatch@5": "^5.1.8"
  "minimatch@9": "^9.0.7"
  "rollup@4": "^4.59.0"
  "tmp": "^0.2.7"
  "underscore": "^1.13.8"
  "ws": "^8.21.0"
# Previously set using `pnpm config set network-timeout`
fetchTimeout: 60000
